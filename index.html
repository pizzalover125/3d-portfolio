    <script>
      AFRAME.registerGeometry("rounded-box", {
        schema: {
          width: { default: 1 },
          height: { default: 1 },
          depth: { default: 1 },
          radius: { default: 0.15 },
        },
        init: function (data) {
          var shape = new THREE.Shape();
          var w = data.width,
            h = data.height,
            r = data.radius;
          shape.moveTo(-w / 2, -h / 2 + r);
          shape.lineTo(-w / 2, h / 2 - r);
          shape.quadraticCurveTo(-w / 2, h / 2, -w / 2 + r, h / 2);
          shape.lineTo(w / 2 - r, h / 2);
          shape.quadraticCurveTo(w / 2, h / 2, w / 2, h / 2 - r);
          shape.lineTo(w / 2, -h / 2 + r);
          shape.quadraticCurveTo(w / 2, -h / 2, w / 2 - r, -h / 2);
          shape.lineTo(-w / 2 + r, -h / 2);
          shape.quadraticCurveTo(-w / 2, -h / 2, -w / 2, -h / 2 + r);

          var extrudeSettings = {
            depth: data.depth,
            bevelEnabled: false,
          };

          var geometry = new THREE.ExtrudeGeometry(shape, extrudeSettings);
          geometry.translate(0, 0, -data.depth / 2);
          this.geometry = geometry;
        },
      });

      AFRAME.registerComponent("navigate-on-click", {
        schema: { url: { default: "" } },
        init: function () {
          var data = this.data;
          var el = this.el;

          el.addEventListener("click", function () {
            window.open(data.url, "_blank");
          });

          el.addEventListener("mouseenter", function () {
            el.setAttribute("material", "color", "#222222");
            el.sceneEl.canvas.style.cursor = "pointer";
          });

          el.addEventListener("mouseleave", function () {
            el.setAttribute("material", "color", "#111111");
            el.sceneEl.canvas.style.cursor = "";
          });
        },
      });
    </script>
    <script>
      AFRAME.registerShader("grainy-gradient", {
        schema: {
          bgColor: { type: "color", is: "uniform", default: "#050504" },
          glowColor: { type: "color", is: "uniform", default: "#faf6ee" },
        },
        vertexShader: `
        varying vec2 vUv;
        void main() {
          vUv = uv;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
        fragmentShader: `
        varying vec2 vUv;
        uniform vec3 bgColor;
        uniform vec3 glowColor;

        float random(vec2 st) {
            return fract(sin(dot(st.xy, vec2(12.9898,78.233))) * 43758.5453123);
        }

        // Value noise
        float noise(vec2 st) {
            vec2 i = floor(st);
            vec2 f = fract(st);

            float a = random(i);
            float b = random(i + vec2(1.0, 0.0));
            float c = random(i + vec2(0.0, 1.0));
            float d = random(i + vec2(1.0, 1.0));

            vec2 u = f*f*(3.0-2.0*f);

            return mix(a, b, u.x) +
                    (c - a)* u.y * (1.0 - u.x) +
                    (d - b) * u.x * u.y;
        }

        float fbm(vec2 st) {
            float value = 0.0;
            float amplitude = .5;
            for (int i = 0; i < 4; i++) {
                value += amplitude * noise(st);
                st *= 2.;
                amplitude *= .5;
            }
            return value;
        }

        void main() {
          vec3 color = bgColor;
          vec2 center = vec2(0.8, 0.8);
          float dist = distance(vUv, center);
          float glow = smoothstep(0.5, 0.0, dist) * 0.15;
          color = mix(color, glowColor, glow);

          float g = fbm(vUv * 800.0);
          color += vec3(g) * 0.07;
          
          float speckles = random(vUv * 2500.0);
          color += vec3(speckles) * 0.06;

          gl_FragColor = vec4(color, 1.0);
        }
      `,
      });
